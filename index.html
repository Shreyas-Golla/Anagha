<!DOCTYPE html>
<html>
<head>

<title>For Anagha ❤️</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
text-align:center;
}

.slide{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:opacity 1.5s;
}

.slide.active{
opacity:1;
}

img{
max-width:85%;
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,100,0.5);
}

/* buttons */

.buttons{
position:fixed;
bottom:30px;
width:100%;
}

a{
background:#ff4d6d;
padding:12px 20px;
border-radius:10px;
color:white;
text-decoration:none;
margin:10px;
}

/* hearts */

.heart{
position:fixed;
bottom:-10px;
color:#ff4d6d;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(0) rotate(-25deg);opacity:1;}
100%{transform:translateY(-100vh) rotate(-25deg);opacity:0;}
}

</style>

</head>

<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="slide active">
<h1>For Anagha ❤️</h1>
<p>This little website is just for you</p>
</div>

<div class="slide">
<img src="photo1.jpg">
<p>Crazy how it all started
with a DT project.

Just another college group…
or at least that's what I thought.</p>
</div>

<div class="slide">
<img src="photo2.jpg">
<p>Your smile is my favorite view</p>
</div>

<div class="slide">
<h1>I love you Anagha ❤️</h1>
</div>

<div class="buttons">

<a href="poem.html">Poem For You ❤️</a>
<a href="praise.html">Why You Are Amazing ✨</a>

</div>

<script>

let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},4000);


/* floating hearts */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
let hearts=["❤️","💖","💗","💝","🩷","🤍"];
heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
